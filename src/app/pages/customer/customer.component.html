<section>
    <div class="container-fluid mt-2">
        <!-- tabs -->
        <p class="locate mx-5">Customer> <span style="color: #2196F3;">Information Listing</span></p>
        <div class="row">
            <div class="col-xs-8 col-sm-8 col-md-8 col-lg-8">
                <div class="page-head mx-2">
                    <div class="body mx-1">
                        <p class="customer-head">Customer Information</p>
                    </div>
                </div>
            </div>
            <div class="col-sm-4">
                <!-- <button type="button" class="btn btn-primary add-btn "
                                          (click)="downloadTemplate()">Download
                                          Template</button> -->
                <button mat-button class="btn1" (click)="BulkDialog()">
                    Bulk Upload
                </button>
                <button mat-button class="btn2" (click)="openDialog()">
                    Add Customer
                </button>
            </div>
        </div>
        <div class="clearfix" *ngIf="view == 'customer'"> 
           <!-- Expense Table -->
            <div class="row">
                <div class="col-lg-12- col-md-12 col-sm-12 col-xs-12">
                    <div class="card">
                        <div class="row justify-content-between">
                            <div class="col-sm-6 px-4 m-0">
                                <mat-form-field style="width: 26%; margin-left:5px;">
                                    <input matInput placeholder="Search.." (keyup)="applyFilter($event)" #input>
                                    <!-- <input matInput placeholder="Search"> -->
                                    <!-- <mat-icon matSuffix>search</mat-icon> -->
                                </mat-form-field>
                            </div>
                            <div class="col-sm-6 mt-2">
                                <span class="badge badge-secondary btn-s ml-4">
                                    <i class="fa fa-print" aria-hidden="true" style="color:black;"></i>
                                </span>
                                <span class="badge badge-secondary btn-s ml-4">
                                    <i class="fa fa-cloud-download" aria-hidden="true" style="color:black;"></i>
                                </span>
                                <span class="badge badge-secondary btn-s ml-4">
                                    <i class="fa fa-cog" aria-hidden="true" style="color:black;"></i>
                                </span>
                            </div>

                        </div>
                        <!-- Material Table For Customer Deatails -->

                        <!-- Material Table For Customer List -->
                        <div class="table-responsive px-5 pl-5">
                            <table mat-table [dataSource]="allcustomerData" matSort>

                                <!-- EXPENSE ID Column -->
                                <ng-container matColumnDef="expenseId">
                                    <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by number"
                                        mat-sort-header>
                                        Customer Name
                                    </th>
                                    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
                                </ng-container>

                                <!-- EXPENSES DATE Column -->
                                <ng-container matColumnDef="date">
                                    <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by name"
                                        mat-sort-header>
                                        Address
                                    </th>
                                    <td mat-cell *matCellDef="let element"> {{element.address}} </td>
                                </ng-container>

                                <!-- EXPENSES TYPE Column -->
                                <ng-container matColumnDef="expensetype">
                                    <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by weight"
                                        mat-sort-header>
                                        Landmark
                                    </th>
                                    <td mat-cell *matCellDef="let element"> {{element.landmark}} </td>
                                </ng-container>

                                <!-- CURRENCY && AMOUNT Column-->
                                <ng-container matColumnDef="amount">
                                    <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by symbol"
                                        mat-sort-header>
                                        Email
                                    </th>
                                    <td mat-cell *matCellDef="let element"> {{element.email}}
                                    </td>
                                </ng-container>

                                <!-- TRIP ID && TRIP NAME Column -->
                                <ng-container matColumnDef="tripid-name">
                                    <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by symbol"
                                        mat-sort-header>
                                        Phone Number
                                    </th>
                                    <td mat-cell *matCellDef="let element"> {{element.phone}} </td>
                                </ng-container>

                                <!-- EXPENSES ADDED BY COLUMN -->
                                <ng-container matColumnDef="user">
                                    <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by symbol"
                                        mat-sort-header>
                                        Notes
                                    </th>
                                    <td mat-cell *matCellDef="let element"> {{element.notes}} </td>
                                </ng-container>
                                <!-- ACTION COLUMN -->
                                <ng-container matColumnDef="action">
                                    <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by symbol">
                                        Action
                                    </th>
                                    <td mat-cell *matCellDef="let element">
                                        <!-- <span class="badge badge-secondary btn-s ml-4"
                                            >
                                            <i class="fa fa-trash"></i>
                                        </span>
                                        <span class="badge badge-secondary btn-s ml-4"
                                            (click)="viewCustomer(element)">
                                            <i class="fa fa-eye" style="color: #3F51B5;">
                                            </i>
                                        </span>
                                        <span class="badge badge-secondary btn-s ml-4"
                                        (click)="editCustomerData(element)">
                                            <i class="fa fa-edit"></i>
                                        </span> -->

                                        <span class="badge badge-secondary btn-s ml-4" (click)="deleteCustomer(element.id)">
                                        <i class="fa fa-trash"></i>
                                    </span>
                                    <span class="badge badge-secondary btn-s ml-4"
                                    (click)="editCustomerData(element)">
                                        <i class="fa fa-edit"></i>
                                    </span>
                                    <span class="badge badge-secondary btn-s ml-4"
                                           (click)="viewCustomer(element)">
                                        <i class="fa fa-eye" style="color: #3F51B5;">
                                        </i>
                                    </span>
                                    </td>
                                </ng-container>

                                <tr mat-header-row
                                    *matHeaderRowDef="['expenseId','date','expensetype','amount','tripid-name', 'user', 'action']">
                                </tr>
                                <!-- <tr mat-header-row *matHeaderRowDef="['startDTonword', 'endDTonword', 'startDTreturn', 'endDTreturn', 'startDTactual', 'endDTactual']"></tr> -->
                                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                            </table>

                            <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons style="float: left;"
                                aria-label="Select page of periodic elements">
                            </mat-paginator>
                        </div>
                        <!-- Material Table For Customer List -->
                    </div>
                </div>
            </div>
        </div>
        <!-- End Manage Expense Block -->
    </div>
</section>
<ngx-spinner>
    <p style="font-size: 20px; color: white">Loading...</p>
  </ngx-spinner>
