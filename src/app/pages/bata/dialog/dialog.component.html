<!-- <a>Select Model popup </a> -->
<div class="col-md-12 block">
    <div class="row mt-3">
        <div class="col-md-5 col-sm-5 block-p">
          <mat-label>Manufacturer</mat-label>
        </div>
        <div class="col-md-7 col-sm-7">
            <mat-select id="vehicle">
                <mat-option value="Toyota">Toyota</mat-option>
                <mat-option value="suzuki">suzuki</mat-option>
            </mat-select>
        </div>
        <div class="col-md-5 col-sm-5 mt-4  block-p">
             <mat-label>Type</mat-label>
        </div>
        <div class="col-md-7 col-sm-7 mt-4">
            <mat-select id="vehicle">
                <mat-option value="Car">Car</mat-option>
                <mat-option value="Car">Car</mat-option>
            </mat-select>
        </div>
        <div class="col-md-12 mt-4">
            <mat-form-field appearance="outline" style="width: 100%; height:30%;">
              <input matInput placeholder="Search Model">
              <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>
          </div>
          <div class="col-md-12 mx-1" >
            <div class="">
            <mat-select multiple style="padding: 1rem ;">
                <mat-option *ngFor="let check of checks">
                    {{check.viewValue}}
                </mat-option>
            </mat-select>
            </div>
        </div>
        <div mat-dialog-action [align]="'center'">
            <span><button class="btn sub-btn mt-4" type="submit">Apply</button></span>
            <span><button class=" btn btn2  mx-4  mt-4" (click)="onNoClick()" type="submit">Cancel</button></span>
        </div>
    </div>
</div>

<ngx-spinner>
    <p style="font-size: 20px; color: white">Loading...</p>
  </ngx-spinner>
