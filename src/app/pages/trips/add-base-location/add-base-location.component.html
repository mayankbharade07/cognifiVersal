<div mat-dialog-content class="mt-3">
    <p class="p-head mx-5">Add Base Location</p>
    <!-------Left Div--------->
    <form [formGroup]="AddBaseLocationForm">
    <div class="col-sm-5">
        <div class="row>">
            <div class="col-md-12 col-sm-12">
                <mat-label>Start Point</mat-label>
            </div>
            <div class="col-md-12 col-sm-12" *ngIf="address">
                <mat-form-field appearance="outline">
                    <input matInput placeholder="Postmaster, Pune H.O, Pune" formControlName="startpoint" readonly/>
                </mat-form-field>
            </div>
            <div class="col-md-12 col-sm-12">
                <mat-label>End Point</mat-label>
            </div>
            <div class="col-md-12 col-sm-12">
                <mat-form-field appearance="outline">
                    <input matInput placeholder="Andheri H.O, Mumbai"  formControlName="endpoint" readonly/>
                </mat-form-field>
            </div>
        </div>
    </div>
    <!-------Right Div--------->
    <div class="col-sm-5">
        <div class="row>">
            <div class="col-md-12 col-sm-12">
                <mat-label>Base Start Point</mat-label>
            </div>
            <div class="col-md-12 col-sm-12">
                <mat-form-field appearance="outline">
                    <mat-select formControlName="basestartpoint" (selectionChange)="getstartBaseLocation($event.value)">
                        <mat-option *ngFor="let data of baselocationdata" [value]="data">{{data.baseLocation}}</mat-option>
                    </mat-select >
                    <mat-error *ngIf="AddBaseLocationForm.get('basestartpoint').hasError('required')">Base Start Point is Required </mat-error>
                </mat-form-field>
            </div>
            <div class="col-md-12 col-sm-12">
                <mat-label>Base End Point</mat-label>
            </div>
            <div class="col-md-12 col-sm-12">
                <mat-form-field appearance="outline">
                    <mat-select formControlName="baseendpoint" (selectionChange)="getendBaseLocation($event.value)">
                        <mat-option *ngFor="let data of baselocationdata" [value]="data" >{{data.baseLocation}}</mat-option>
                    </mat-select >
                    <mat-error *ngIf="AddBaseLocationForm.get('baseendpoint').hasError('required')">Base End Point is Required </mat-error>
                </mat-form-field>
            </div>
        </div>
    </div>
    <div class="col-sm-2">
        <div class="row>">
            <div class="col-md-12 col-sm-12">
                <mat-label>Distance</mat-label>
            </div>
            <div class="col-md-12 col-sm-12">
                <mat-form-field appearance="outline">
                    <input matInput placeholder="IN KM" formControlName="distance1">
                    
                </mat-form-field>
            </div>
            <div class="col-md-12 col-sm-12">
                <mat-label>Distance</mat-label>
            </div>
            <div class="col-md-12 col-sm-12">
                <mat-form-field appearance="outline">
                    <input matInput placeholder="IN KM" formControlName="distance2">
                </mat-form-field>
            </div>
        </div>
    </div>
    <div mat-dialog-action [align]="'left'">
        <button mat-button class="btn btn1 mt-2 mx-5" type="submit" (click)="submit()">Save</button>
        <button mat-button class="btn btn2 mt-2" (click)="onNoClick()" type="submit">Cancel</button>
    </div>
</form>
</div>
<ngx-spinner>
    <p style="font-size: 20px; color: white">Loading...</p>
  </ngx-spinner>
