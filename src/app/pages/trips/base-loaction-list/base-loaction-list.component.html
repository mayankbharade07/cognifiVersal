<section>
    <div class="container-fluid">
        <div class="row">
            <p>Trip Listing >Trip Details><span style="color: #2196F3;">Location-Details</span></p>
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <div class="row m-0">
                    <div class="col-lg-6 col-md-12 col-sm-12 mt-3">
                        <div class="card p-0">
                            <form [formGroup]="addbaseLocationForm">
                                <div class="card-body p-4">
                                    <div class="row">
                                    <div class="col-lg-4 col-md-4 col-sm-12">
                                        <mat-label>Base Location Name</mat-label>
                                        <mat-form-field  appearance="outline">
                                            <input matInput formControlName="baseLocation">
                                        </mat-form-field>
                                    </div>
                                    <div class="col-lg-8 col-md-8 col-sm-12">
                                        <mat-label>Address</mat-label>
                                        <mat-form-field  appearance="outline">
                                            <input matInput [(ngModel)]="address" formControlName="address" readonly>
                                          </mat-form-field>
                                    </div>
                                    <div mat-dialog-action [align]="'right'">
                                        <button mat-button class="btn btn1  mx-3" (click)="submit()">Save</button>
                                        <button mat-button class=" btn btn2  p-0" type="submit">Cancel</button>
                                    </div>
                                </div>
                                  </div>
                            </form>
                              <div class="table-responsive px-5 pl-5 mt-2 mb-5">
                                <table mat-table [dataSource]="baselocationData" matSort
                                     class="mat-elevation-z8">
    
                                    <!--  ID Column -->
                                    <ng-container matColumnDef="Id">
                                        <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by number"
                                            mat-sort-header>
                                            #
                                        </th>
                                        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
                                    </ng-container>
    
                                    <!-- BaseLocationName Column -->
                                    <ng-container matColumnDef="BaseLocationName">
                                        <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by name"
                                            mat-sort-header>
                                            Base Location Name
                                        </th>
                                        <td mat-cell *matCellDef="let element"> {{element.baseLocation}} </td>
                                    </ng-container>
    
                                    <!-- Address Column -->
                                    <ng-container matColumnDef="Address">
                                        <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by weight"
                                            mat-sort-header>
                                            Address
                                        </th>
                                        <td mat-cell *matCellDef="let element"> <span *ngIf="element.address">{{element.address}}</span> </td>
                                        <td mat-cell *matCellDef="let element"> <span *ngIf="!element.address"> --- </span> </td>
                                    </ng-container>
                                    <!-- ACTION COLUMN -->
                                    <ng-container matColumnDef="Action">
                                        <th mat-header-cell *matHeaderCellDef sortActionDescription="Sort by symbol">
                                            Action
                                        </th>
                                        <td mat-cell *matCellDef="let element">
                                             <span class="badge badge-secondary btn-s ml-4" (click)="deleteBaseLoction(element.id)">
                                                <i class="fa fa-trash"></i>
                                            </span>
                                            <span class="badge badge-secondary btn-s ml-4" (click)="editbaseLocation(element)">
                                                <i class="fa fa-edit"></i>
                                            </span>                                             
                                        </td>
                                    </ng-container>
                                    <tr mat-header-row
                                        *matHeaderRowDef="['Id','BaseLocationName','Address','Action']">
                                    </tr>
                                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                                </table>
                                <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons style="float: left;"
                  aria-label="Select page of periodic elements">
                </mat-paginator>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-12 col-sm-12 mt-3">
                        <div class="card p-0">
                            <!-- <mat-form-field  appearance="outline">
                                <input class="search-btn" type="search" matInput>
                            </mat-form-field> -->
                            <!-- <iframe class="map"
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3679.3747375871835!2d75.90937681496287!3d22.751470285091056!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39631d5891adfb65%3A0xea28a34c2ba3a5ab!2sMoreYeahs%20Inc!5e0!3m2!1sen!2sin!4v1658699570786!5m2!1sen!2sin"
                                width="100%" height="360" style="border:0;" allowfullscreen="" loading="lazy"
                                referrerpolicy="no-referrer-when-downgrade">
                            </iframe> -->
                            <!-- <agm-map [latitude]="lat" [longitude]="lng"></agm-map> -->
                            <div class="container">
                              
                                <div class="form-group">
                                  <!-- <label>Enter address</label> -->
                                  <input type="text" class="form-control" (keydown.enter)="$event.preventDefault()" (keyup.enter)="getEnterAddress($event)" 
                                   placeholder="Search Base Location..." autocorrect="off" autocapitalize="off" spellcheck="off" type="text" #search>
                                </div>
                              
                                <agm-map [latitude]="latitude" [longitude]="longitude" [zoom]="zoom">
                                  <agm-marker [latitude]="latitude" [longitude]="longitude" [markerDraggable]="true"
                                    (dragEnd)="markerDragEnd($event)"></agm-marker>
                                </agm-map>
                              
                                <!-- <h5>Address: {{address}}</h5>
                                <div>Latitude: {{latitude}}</div>
                                <div>Longitude: {{longitude}}</div> -->
                              </div>
                            
                        </div>
                    </div>
                </div><ngx-spinner>
                    <p style="font-size: 20px; color: white">Loading...</p>
                  </ngx-spinner>
            </div>
        </div>
    </div>
</section>
